spring.application.name=proyectoBarberia
server.port=8081


# Configuración de Base de Datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_proyecto_barberia?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver


# JPA / Hibernate - Con Flyway desactivamos la creación automática de Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


# Activación de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true


eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
